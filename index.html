<!DOCTYPE html>
<html lang="zh">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<!-- 🔧 防止浏览器缓存 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>我的日常记录</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>📘 我的日常记录</h1>

<!-- 🔐 登录/注册页面 -->
<div class="page page-auth">
  <div class="card auth-card">
    <h3 id="authTitle">🔐 登录</h3>
    
    <input type="email" id="authEmail" placeholder="邮箱地址">
    <input type="password" id="authPassword" placeholder="密码">
    
    <button onclick="handleAuth()" id="authButton">登录</button>
    <button onclick="toggleAuthMode()" id="toggleAuthBtn" style="background: #5856d6; margin-top: 8px;">切换到注册</button>
    
    <p id="authMessage" style="color: red; font-size: 14px; margin-top: 10px;"></p>
  </div>
</div>

<!-- 📘 记录页面 -->
<div class="page page-home">

  <!-- 用户信息栏 -->
  <div class="user-info">
    <span id="userEmail"></span>
    <button onclick="logout()" style="width: auto; padding: 6px 12px; margin: 0; background: #ff3b30; font-size: 14px;">退出</button>
  </div>

  <div class="card">
    <h3 id="currentDateTitle">📅 今天</h3>

    事件：
    <input id="event">

    感想：
    <textarea id="note" rows="2"></textarea>

    心情：
    <div class="mood" id="moodList">
      <span>😄</span>
      <span>😐</span>
      <span>😢</span>
      <span>😡</span>
      <span>🥱</span>
      <span>😍</span>
    </div>

    <input id="customMood" placeholder="输入emoji，例如 😎">
    <button onclick="addCustomMood()">添加心情</button>

    <button onclick="addEvent()">添加记录</button>
  </div>

  <div class="card">
    <h3>📜 当天记录</h3>
    <ul id="list"></ul>
  </div>

</div>

<!-- ⚙ 睡眠 -->
<div class="page page-settings">
  <div class="card">
    <h3>😴 睡眠</h3>
    <input type="number" id="sleep">
    <button onclick="saveSleep()">保存</button>
  </div>
</div>

<!-- 🗓 日历 -->
<div class="page page-calendar">
  <div class="card">
    <h3>🗓 日历</h3>
    
    <!-- ⭐新增：月份切换导航 -->
    <div class="calendar-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="currentMonth">加载中...</span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    
    <div id="calendar" class="calendar"></div>
  </div>
</div>

<!-- 📱 底部导航 -->
<div class="tabbar" id="mainTabbar" style="display: none;">
  <div onclick="switchTab('home')" id="tab-home">📘<br>记录</div>
  <div onclick="switchTab('calendar')" id="tab-calendar">🗓<br>日历</div>
  <div onclick="switchTab('settings')" id="tab-settings">⚙<br>睡眠</div>
</div>

<script src="script.js"></script>
</body>
</html>
